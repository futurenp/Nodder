<p class="page__title">User</p>
<app-page-card>
  <h2>API</h2>
  <hr/>
  <ngx-typed-js
    [strings]="['Enable API usage per platform. An API key is required for publishing.']"
    [typeSpeed]="2"
    [showCursor]="false"
  >
    <p class="typing"></p>
  </ngx-typed-js>
  <span id="user-info-labels">
    <p>Platform</p>
    <p>Enable</p>
  </span>
  @for (platform of platforms; track platform.id) {
    <app-token-input [platformInput]="platform.id">
    </app-token-input>
  }
  <app-reset-user/>
</app-page-card>
