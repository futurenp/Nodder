<h2>Create</h2>
<p>Name</p>
<app-input-box [saveLoc]="Keys.Create.NAME" [placeholder]="'Enter Project Name...'"></app-input-box>
<p>Summary</p>
<app-input-box [saveLoc]="Keys.Create.SUMMARY" [placeholder]="'Enter Project Summary...'"></app-input-box>
<p>Visibility</p>
<app-horizontal-switcher
  [saveLoc]="Keys.Create.VISIBILITY"
  [labels]="[
  { id: 'public', name: 'Public' },
  { id: 'unlisted', name: 'Unlisted' },
  { id: 'private', name: 'Private' }
  ]"
>
</app-horizontal-switcher>
<div class="btn-div">
  <button class="btn" (click)="create()">Create</button>
  <button class="btn" (click)="clear()">Clear</button>
</div>
