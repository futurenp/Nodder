<ngx-typed-js
  [strings]="['Create.', 'Update.', 'Publish.']"
  [shuffle]="true"
  [typeSpeed]="60"
  [showCursor]="false"
  [startDelay]="100"
  [loop]="true">
  <p id="hidden">.<span class="typing header"></span></p>
</ngx-typed-js>
<hr/>
<h3 class="subsection-label">Info</h3>
<p>Here is a page where you can publish your mods!</p>
<p>- Use <span class="highlight">Create</span> to create a new project from scratch. </p>
<p>- Use <span class="highlight">Update</span> to update an existing project. </p>
<p>Ensure you have given an API token to the platform you intend to use in <span class="highlight">User</span> to have the correct permissions. </p>
