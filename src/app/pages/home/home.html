<p class="page__title">Home <span id="readme">[readme]</span></p>

<app-page-card>
  <ngx-typed-js
    class="modding-for"
    [strings]="['Modrinth.', 'Curseforge.', 'You.']"
    [shuffle]="true"
    [typeSpeed]="40"
    [startDelay]="100"
    [showCursor]="false">
    Modding for <span class="typing header"></span>
  </ngx-typed-js>
  <hr/>

  <h3 class="subsection-label">What Nodder Does:</h3>
  <ngx-typed-js
    [showCursor]="false"
    [typeSpeed]="1"
    [strings]="['Nodder is a web based tool that allows mod developers to upload and maintain their ' +
     'projects on multiple platforms without the inconvenience of uploading separately to each platform. ' +
     'Nodder needs a user provided API key, and then using the Publish page, can upload and update projects. ' +
     '<br/><br/>Only creating projects and using Modrinth API is supported at the moment.']">
    <p class="typing description"></p>
  </ngx-typed-js>
  <h3 class="subsection-label">Who This is For:</h3>
  <ngx-typed-js
    [showCursor]="false"
    [typeSpeed]="1"
    [startDelay]="500"
    [strings]="['Mod developers for Minecraft (and myself). Though, I would recommend to make this functionality' +
     ' integrated into your own project. This is was made mainly for school (and fun).']">
    <p class="typing description"></p>
  </ngx-typed-js>
  <h3 class="subsection-label">Frameworks, Libraries, & Tools Used:</h3>
  <ngx-typed-js
    [showCursor]="false"
    [typeSpeed]="1"
    [startDelay]="1000"
    [strings]="['I made this project using  <span class=\'highlight\'>Angular 21.2.8</span> with the intention of learning Angular and Typescript.' +
     ' I also used the <span class=\'highlight\'>ngx-typed-js</span> library for these cool text animations which are probably overused,'
     + ' but I think they\'re cool. I also used JetBrains Webstorm as an IDE.']">
    <p class="typing description"></p>
  </ngx-typed-js>

  <h3 class="subsection-label">Project Reflection:</h3>
  <ngx-typed-js
    [showCursor]="false"
    [typeSpeed]="1"
    [startDelay]="1500"
    [strings]="['My basic design idea for this project was to essentially just use JS to make a GUI to interact with these platforms API\'s. ' +
    'Using the framework that Angular has given, all of the pages use the app router, so this is essentially a single page application internally. ' +
    'All of the components are defined in their own files and classes, and it makes for a very organized experience. Localstorage was used to save all the ' +
    'user information. Animations are used on every page, some for the text typing effect, the page card fade in, the API key toggles, and many more. ' +
    '<br/><br/>Some functionality that this project does at the moment is:' +
    '<br/>\t - Enable / Disable usage of platforms:' +
    '<br/>\t - Save API keys:' +
    '<br/>\t - Create (basic) projects using Modrinth:' +
    '<br/><br/>I learned that I should start a project like this much earlier in advance. I underestimated how much progress I would make ' +
    'while learning Angular and TS for the first time which I should have probably realized much earlier. I also wanted to use as little of ' +
     'AI tools when making this as possible, which probably contributed to ' +
    'some slowness as I feel that I have been too reliant on them.']">
    <p class="typing description"></p>
  </ngx-typed-js>
</app-page-card>
