<div id="padding-div">
  <span class="token-row">
  <p id="title">{{ platform()?.name }}</p>
  <input
    type="checkbox"
    #showInput
    (click)="onClickCheckbox($event)"
    [checked]="platform()?.enabled"
  />
  <p>API Token</p>
    @if (showInput.checked) {
      <input
        type="password"
        placeholder="Paste API token here..."
        animate.enter="fade-in"
        (keyup)="onUpdateApiText($event)"
        [value]="platform()?.apiKey"
      />
    }
  </span>
</div>
